databases:
  - name: weather-cast-db
    plan: free
    databaseName: weather_cast
    user: weather

services:
  - type: web
    name: weather-cast-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weather-cast-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://weather-cast-frontend.onrender.com,http://localhost:3000

  - type: web
    name: weather-cast-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://weather-cast-backend.onrender.com
      - key: PORT
        value: 3000
